
# ============================================================
#  HOTEL BACKEND — application.properties
# ============================================================

# --- Serveur ---
server.port=8080
server.servlet.context-path=/api

# --- Application ---
spring.application.name=hotel-backend

# --- Base de donnees MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# --- Pool de connexions HikariCP ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# --- JPA / Hibernate ---
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# --- Jackson (JSON) ---
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# --- JWT ---
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# --- CORS ---
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# --- Logs ---
logging.level.com.hotel=DEBUG
logging.level.org.springframework.security=DEBUG